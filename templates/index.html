<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>スタッフ専用マイページ - 希望休提出</title>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; color: #333; background-color: #f4f7f6; display: flex; flex-direction: column; align-items: center;}
        .container { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 400px; box-sizing: border-box;}
        h1 { font-size: 22px; text-align: center; margin-bottom: 20px; color: #2c3e50;}
        .form-group { margin-bottom: 15px; }
        .form-label { font-weight: bold; display: block; margin-bottom: 5px; color: #555;}
        .form-input { padding: 12px; font-size: 16px; width: 100%; border-radius: 5px; border: 1px solid #ccc; box-sizing: border-box;}
        .btn { background-color: #4CAF50; color: white; padding: 15px; border: none; border-radius: 5px; font-size: 16px; cursor: pointer; width: 100%; font-weight: bold; margin-top: 10px;}
        .btn:hover { background-color: #45a049; }
        .btn-logout { background-color: #95a5a6; padding: 8px 15px; font-size: 14px; margin-top: 15px; }
        .calendar-title { text-align: center; font-size: 20px; font-weight: bold; margin-bottom: 10px; }
        .calendar-grid, .weekday-header { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }
        .weekday-header div { text-align: center; font-weight: bold; font-size: 14px; padding-bottom: 5px; }
        .sun { color: #e74c3c; } .sat { color: #3498db; }
        .day-cell { border: 1px solid #ddd; border-radius: 5px; padding: 5px; text-align: center; cursor: pointer; background-color: #f9f9f9; user-select: none; font-size: 14px; display: flex; flex-direction: column; justify-content: space-between; min-height: 55px; box-sizing: border-box; transition: 0.2s;}
        .empty-cell { border: none; background-color: transparent; }
        .date-number { font-weight: bold; margin-bottom: 3px; }
        .shift-toggles { display: flex; gap: 2px; width: 100%; }
        .shift-toggle { flex: 1; font-size: 10px; padding: 4px 0; border: 1px solid #ccc; border-radius: 3px; background-color: white; color: #777; transition: 0.2s;}
        .shift-toggle.selected { background-color: #ff6b6b; color: white; border-color: #ff6b6b; font-weight: bold; }
        .selected-full { background-color: #ff6b6b !important; border-color: #ff6b6b !important; color: white !important;}
        .disabled-calendar { opacity: 0.5; pointer-events: none; }
        .alert-box { padding: 10px; border-radius: 5px; margin-bottom: 15px; font-weight: bold; text-align: center; font-size: 14px;}
        .alert-closed { background-color: #ffebee; color: #c62828; border: 1px solid #f44336; }
        .alert-submitted { background-color: #e3f2fd; color: #1565c0; border: 1px solid #2196f3; }
        .hidden { display: none !important; }
        /* ★ローディング画面 */
        #loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #4CAF50; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin-bottom: 10px;}
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="loading-overlay">
        <div class="spinner"></div>
        <p style="color: #666; font-weight: bold;">データを準備中...</p>
    </div>

    <div id="login-section" class="container hidden">
        <h1>希望休 提出ログイン</h1>
        <p style="font-size: 12px; color: #e74c3c; text-align: center;">※初回のみ入力が必要です。次回から自動で開きます！</p>
        <div class="form-group">
            <label for="staff-select" class="form-label">あなたの名前:</label>
            <select id="staff-select" class="form-input">
                <option value="">-- 選択してください --</option>
            </select>
        </div>
        <div class="form-group">
            <label for="staff-password" class="form-label">従業員番号:</label>
            <input type="text" id="staff-password" class="form-input" placeholder="従業員番号を入力">
        </div>
        <button class="btn" onclick="login()">ログイン</button>
    </div>

    <div id="main-section" class="container hidden">
        <h1 id="welcome-message">〇〇さんの提出画面</h1>
        <div id="status-alert" class="alert-box hidden"></div>
        <div id="calendar-title" class="calendar-title"></div>
        
        <div id="no-shift-container" style="margin-bottom: 15px; background: #e8f5e9; padding: 10px; border-radius: 5px;">
            <label style="font-weight:bold; color:#2e7d32; display: flex; align-items: center; cursor: pointer;">
                <input type="checkbox" id="no-shift-cb" style="transform: scale(1.5); margin-right:10px;" onchange="toggleCalendar()">
                今月は希望休なし（いつでも出勤可）
            </label>
        </div>

        <div id="calendar-wrapper" style="margin-bottom: 20px;">
            <div class="weekday-header">
                <div class="sun">日</div><div>月</div><div>火</div><div>水</div><div>木</div><div>金</div><div class="sat">土</div>
            </div>
            <div id="calendar-grid" class="calendar-grid"></div>
        </div>

        <div class="form-group">
            <label for="staff-memo" class="form-label">備考：</label>
            <textarea id="staff-memo" class="form-input" rows="3" style="resize: vertical;"></textarea>
        </div>
        <button id="submit-btn" class="btn" onclick="submitShifts()">提出する</button>
    </div>

    <script>
        // ==========================================
        // 【重要】↓ あなたのLIFF IDに必ず書き換えてください！
        const MY_LIFF_ID = "2009678206-8dFeKNUG"; 
        // 例: "1234567890-abcdefg" （ダブルクォーテーションで囲むのを忘れずに）
        // ==========================================

        let userLineId = null; 
        
        let dayOffs = []; 
        let nightOffs = []; 
        let currentTargetMonthStr = "";
        let isSystemOpen = true;
        let loggedInStaffId = null;
        let loggedInPassword = "";
        let isDoubleShiftUser = false; 
        let nationalHolidays = {}; 

        const today = new Date();
        let targetYear = today.getFullYear();
        let targetMonth = today.getMonth() + 2;
        if (targetMonth > 12) { targetMonth = 1; targetYear += 1; }
        currentTargetMonthStr = `${targetYear}-${String(targetMonth).padStart(2, '0')}`;

        window.onload = async function() {
            try {
                const holRes = await fetch('https://holidays-jp.github.io/api/v1/date.json');
                nationalHolidays = await holRes.json();
            } catch (error) { console.error("祝日エラー", error); }

            const statusRes = await fetch('/api/status');
            const statusData = await statusRes.json();
            isSystemOpen = statusData.is_open;

            // ▼ 追加：LINE LIFFの初期化と自動ログイン判定 ▼
            try {
                await liff.init({ liffId: MY_LIFF_ID });
                if (liff.isLoggedIn()) {
                    const profile = await liff.getProfile();
                    userLineId = profile.userId;

                    // バックエンドにこのLINE IDを知っているか聞きに行く
                    const autoRes = await fetch('/api/liff_login', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ line_id: userLineId })
                    });
                    const autoData = await autoRes.json();
                    
                    if (autoData.linked) {
                        // アカウントが紐づいていた場合：自動でログイン処理を走らせる
                        await executeLogin(autoData.staff_id, autoData.password, autoData.name);
                        document.getElementById('loading-overlay').classList.add('hidden');
                        return; // ここで終了させる
                    }
                }
            } catch(e) {
                console.error("LIFF 初期化エラー:", e);
                // パソコンからのアクセスなどの場合はそのまま進む
            }

            // 自動ログインできなかった場合は、通常のリスト取得とログイン画面表示へ
            const response = await fetch('/api/staff');
            const staffList = await response.json();
            const select = document.getElementById('staff-select');
            staffList.forEach(staff => {
                const option = document.createElement('option');
                option.value = staff.id;
                option.textContent = staff.name;
                select.appendChild(option);
            });
            
            document.getElementById('loading-overlay').classList.add('hidden');
            document.getElementById('login-section').classList.remove('hidden');
        };

        async function login() {
            const staffId = document.getElementById('staff-select').value;
            const password = document.getElementById('staff-password').value;
            const selectEl = document.getElementById('staff-select');
            const staffName = selectEl.options[selectEl.selectedIndex].text;

            if (!staffId || !password) {
                alert("名前と従業員番号を入力してください。");
                return;
            }
            await executeLogin(staffId, password, staffName);
        }

        async function executeLogin(staffId, password, staffName) {
            const res = await fetch('/api/staff/my_shifts', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    staff_id: parseInt(staffId),
                    password: password,
                    target_month: currentTargetMonthStr,
                    line_id: userLineId // ★追加：LINEから開いている場合はIDを送る
                })
            });

            if (!res.ok) {
                const errorData = await res.json();
                alert(errorData.error || "ログインに失敗しました");
                return;
            }

            const data = await res.json();
            loggedInStaffId = parseInt(staffId);
            loggedInPassword = password;
            isDoubleShiftUser = data.is_double_shift || false; 

            document.getElementById('welcome-message').textContent = `${staffName} さんの希望休`;
            document.getElementById('login-section').classList.add('hidden');
            document.getElementById('main-section').classList.remove('hidden');

            setupDashboard(data);
        }

        function setupDashboard(data) {
            const alertBox = document.getElementById('status-alert');
            const submitBtn = document.getElementById('submit-btn');
            const memoEl = document.getElementById('staff-memo');
            const noShiftCb = document.getElementById('no-shift-cb');
            const noShiftContainer = document.getElementById('no-shift-container');
            const calendarWrapper = document.getElementById('calendar-wrapper');

            dayOffs = data.day_offs || [];
            nightOffs = data.night_offs || [];
            memoEl.value = data.memo || "";

            if (data.submitted && dayOffs.length === 0 && nightOffs.length === 0) {
                noShiftCb.checked = true;
            } else {
                noShiftCb.checked = false;
            }

            if (!isSystemOpen) {
                alertBox.textContent = "受付期間は終了しました。以下の内容で登録されています。";
                alertBox.className = "alert-box alert-closed";
                alertBox.classList.remove('hidden');
                submitBtn.classList.add('hidden');
                memoEl.disabled = true;
                noShiftCb.disabled = true;
                noShiftContainer.style.opacity = "0.6";
                calendarWrapper.classList.add('disabled-calendar');
            } else {
                submitBtn.classList.remove('hidden');
                submitBtn.textContent = data.submitted ? "変更を再提出する" : "提出する";
                if (data.submitted) {
                    alertBox.textContent = "提出済みです。内容を変更する場合は修正して再提出してください。";
                    alertBox.className = "alert-box alert-submitted";
                    alertBox.classList.remove('hidden');
                } else {
                    alertBox.classList.add('hidden');
                }
            }

            generateCalendar();
            toggleCalendar();
        }

        function toggleCalendar() {
            const isChecked = document.getElementById('no-shift-cb').checked;
            const calendarWrapper = document.getElementById('calendar-wrapper');
            if (isChecked) {
                calendarWrapper.classList.add('disabled-calendar');
                if (isSystemOpen) {
                    dayOffs = []; nightOffs = [];
                    document.querySelectorAll('.shift-toggle').forEach(el => el.classList.remove('selected'));
                    document.querySelectorAll('.day-cell').forEach(el => {
                        el.classList.remove('selected-full');
                        const dateSpan = el.querySelector('.date-number');
                        if(dateSpan && el.dataset.origColor) dateSpan.style.color = el.dataset.origColor;
                    });
                }
            } else {
                if (isSystemOpen) calendarWrapper.classList.remove('disabled-calendar');
            }
        }

        function toggleShift(dateStr, timeOfDay, element, forceState = null) {
            let list = timeOfDay === 'day' ? dayOffs : nightOffs;
            const isCurrentlyOff = list.includes(dateStr);
            const newState = forceState !== null ? forceState : !isCurrentlyOff;
            
            if (newState) {
                if (!list.includes(dateStr)) list.push(dateStr);
                element.classList.add('selected');
            } else {
                if (timeOfDay === 'day') dayOffs = dayOffs.filter(d => d !== dateStr);
                else nightOffs = nightOffs.filter(d => d !== dateStr);
                element.classList.remove('selected');
            }
        }

        function generateCalendar() {
            const calendarGrid = document.getElementById('calendar-grid');
            calendarGrid.innerHTML = '';
            document.getElementById('calendar-title').textContent = `${currentTargetMonthStr.replace('-', '年 ')}月`;

            const year = parseInt(currentTargetMonthStr.split('-')[0]);
            const month = parseInt(currentTargetMonthStr.split('-')[1]);
            const firstDayOfWeek = new Date(year, month - 1, 1).getDay();
            const daysInMonth = new Date(year, month, 0).getDate();

            for (let i = 0; i < firstDayOfWeek; i++) {
                const emptyDiv = document.createElement('div');
                emptyDiv.className = 'empty-cell';
                calendarGrid.appendChild(emptyDiv);
            }

            for (let i = 1; i <= daysInMonth; i++) {
                const dayDiv = document.createElement('div');
                dayDiv.className = 'day-cell';
                
                const monthStr = String(month).padStart(2, '0');
                const dayStr = String(i).padStart(2, '0');
                const dateString = `${year}-${monthStr}-${dayStr}`;
                const currentDayOfWeek = (firstDayOfWeek + i - 1) % 7;
                const isHoliday = nationalHolidays[dateString] !== undefined;
                
                let dateColor = '#333';
                if (currentDayOfWeek === 0 || isHoliday) dateColor = '#e74c3c';
                else if (currentDayOfWeek === 6) dateColor = '#3498db';
                dayDiv.dataset.origColor = dateColor; 

                if (isDoubleShiftUser) {
                    const isDaySelected = dayOffs.includes(dateString) ? 'selected' : '';
                    const isNightSelected = nightOffs.includes(dateString) ? 'selected' : '';
                    dayDiv.innerHTML = `
                        <div class="date-number" style="color: ${dateColor};">${i}</div>
                        <div class="shift-toggles">
                            <div class="shift-toggle ${isDaySelected}" data-time="day">昼休</div>
                            <div class="shift-toggle ${isNightSelected}" data-time="night">夜休</div>
                        </div>
                    `;
                    if (isSystemOpen) {
                        const toggles = dayDiv.querySelectorAll('.shift-toggle');
                        toggles[0].onclick = (e) => { if(!document.getElementById('no-shift-cb').checked){ e.stopPropagation(); toggleShift(dateString, 'day', toggles[0]); } };
                        toggles[1].onclick = (e) => { if(!document.getElementById('no-shift-cb').checked){ e.stopPropagation(); toggleShift(dateString, 'night', toggles[1]); } };
                        dayDiv.onclick = () => {
                            if(document.getElementById('no-shift-cb').checked) return;
                            if (dayOffs.includes(dateString) && nightOffs.includes(dateString)) {
                                toggleShift(dateString, 'day', toggles[0], false); toggleShift(dateString, 'night', toggles[1], false);
                            } else {
                                toggleShift(dateString, 'day', toggles[0], true); toggleShift(dateString, 'night', toggles[1], true);
                            }
                        };
                    }
                } else {
                    const isFullOff = dayOffs.includes(dateString) || nightOffs.includes(dateString);
                    if (isFullOff) dayDiv.classList.add('selected-full');
                    dayDiv.innerHTML = `<div class="date-number" style="color: ${isFullOff ? 'white' : dateColor};">${i}</div><div style="flex-grow: 1;"></div>`;
                    if (isSystemOpen) {
                        dayDiv.onclick = () => {
                            if(document.getElementById('no-shift-cb').checked) return;
                            if (dayOffs.includes(dateString) || nightOffs.includes(dateString)) {
                                dayOffs = dayOffs.filter(d => d !== dateString); nightOffs = nightOffs.filter(d => d !== dateString);
                                dayDiv.classList.remove('selected-full'); dayDiv.querySelector('.date-number').style.color = dateColor;
                            } else {
                                dayOffs.push(dateString); nightOffs.push(dateString);
                                dayDiv.classList.add('selected-full'); dayDiv.querySelector('.date-number').style.color = 'white';
                            }
                        };
                    }
                }
                calendarGrid.appendChild(dayDiv);
            }
        }

        async function submitShifts() {
            const memo = document.getElementById('staff-memo').value;
            const isNoShift = document.getElementById('no-shift-cb').checked;
            
            if (!isNoShift && dayOffs.length === 0 && nightOffs.length === 0) {
                alert('休み希望日を選択するか、「希望休なし」にチェックを入れてください');
                return;
            }

            const payload = {
                staff_id: loggedInStaffId, password: loggedInPassword, 
                day_offs: dayOffs, night_offs: nightOffs,
                target_month: currentTargetMonthStr, memo: memo
            };

            const response = await fetch('/api/shifts', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (response.ok) {
                alert('シフトの提出・更新が完了しました！');
                if (userLineId) {
                    // LINE内の場合、提出後に画面を自動で閉じる機能
                    liff.closeWindow();
                } else {
                    window.location.reload(); 
                }
            } else {
                const errorData = await response.json();
                alert(errorData.error || 'エラーが発生しました');
            }
        }
    </script>
</body>
</html>
