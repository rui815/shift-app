<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>スタッフ専用マイページ - 希望休提出</title>
    <style>
        body { font-family: sans-serif; padding: 20px; color: #333; background-color: #f4f7f6; display: flex; flex-direction: column; align-items: center;}
        
        /* ログイン画面とメイン画面のコンテナ */
        .container { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 400px; box-sizing: border-box;}
        
        h1 { font-size: 22px; text-align: center; margin-bottom: 20px; color: #2c3e50;}
        
        .form-group { margin-bottom: 15px; }
        .form-label { font-weight: bold; display: block; margin-bottom: 5px; color: #555;}
        .form-input { padding: 12px; font-size: 16px; width: 100%; border-radius: 5px; border: 1px solid #ccc; box-sizing: border-box;}
        
        .btn { background-color: #4CAF50; color: white; padding: 15px; border: none; border-radius: 5px; font-size: 16px; cursor: pointer; width: 100%; font-weight: bold; margin-top: 10px;}
        .btn:hover { background-color: #45a049; }
        .btn-logout { background-color: #95a5a6; padding: 8px 15px; font-size: 14px; margin-top: 15px; }

        .calendar-title { text-align: center; font-size: 20px; font-weight: bold; margin-bottom: 10px; }
        .calendar-grid, .weekday-header { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }
        .weekday-header div { text-align: center; font-weight: bold; font-size: 14px; padding-bottom: 5px; }
        .sun { color: #e74c3c; } .sat { color: #3498db; }
        .day-cell { border: 1px solid #ddd; border-radius: 5px; padding: 10px 0; text-align: center; cursor: pointer; background-color: #f9f9f9; user-select: none; font-size: 16px; transition: 0.2s; }
        .empty-cell { border: none; background-color: transparent; }
        .day-cell.selected { background-color: #ff6b6b; color: white; font-weight: bold; border-color: #ff6b6b; }
        
        .disabled-calendar { opacity: 0.5; pointer-events: none; }
        
        .alert-box { padding: 10px; border-radius: 5px; margin-bottom: 15px; font-weight: bold; text-align: center; font-size: 14px;}
        .alert-closed { background-color: #ffebee; color: #c62828; border: 1px solid #f44336; }
        .alert-submitted { background-color: #e3f2fd; color: #1565c0; border: 1px solid #2196f3; }
        
        /* 非表示用のクラス */
        .hidden { display: none !important; }

        /* 追加: 祝日名を表示する用のスタイル */
        .holiday-name { font-size: 10px; color: #e74c3c; display: block; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; margin-top: 2px; }
    </style>
</head>
<body>

    <div id="login-section" class="container">
        <h1>希望休 提出ログイン</h1>
        
        <div class="form-group">
            <label for="staff-select" class="form-label">あなたの名前:</label>
            <select id="staff-select" class="form-input">
                <option value="">-- 選択してください --</option>
            </select>
        </div>

        <div class="form-group">
            <label for="staff-password" class="form-label">従業員番号:</label>
            <input type="text" id="staff-password" class="form-input" placeholder="従業員番号を入力">
        </div>

        <button class="btn" onclick="login()">ログイン</button>
    </div>


    <div id="main-section" class="container hidden">
        <h1 id="welcome-message">〇〇さんの提出画面</h1>
        
        <div id="status-alert" class="alert-box hidden"></div>

        <div id="calendar-title" class="calendar-title"></div>
        
        <div id="no-shift-container" style="margin-bottom: 15px; background: #e8f5e9; padding: 10px; border-radius: 5px;">
            <label style="font-weight:bold; color:#2e7d32; display: flex; align-items: center; cursor: pointer;">
                <input type="checkbox" id="no-shift-cb" style="transform: scale(1.5); margin-right:10px;" onchange="toggleCalendar()">
                今月は希望休なし（いつでも出勤可）
            </label>
        </div>

        <div id="calendar-wrapper" style="margin-bottom: 20px;">
            <div class="weekday-header">
                <div class="sun">日</div><div>月</div><div>火</div><div>水</div><div>木</div><div>金</div><div class="sat">土</div>
            </div>
            <div id="calendar-grid" class="calendar-grid"></div>
        </div>

        <div class="form-group">
            <label for="staff-memo" class="form-label">備考：</label>
            <textarea id="staff-memo" class="form-input" rows="3" style="resize: vertical;"></textarea>
        </div>

        <button id="submit-btn" class="btn" onclick="submitShifts()">提出する</button>
        <button class="btn btn-logout" onclick="logout()">別のスタッフとしてログイン</button>
    </div>

    <script>
        let selectedDates = []; 
        let currentTargetMonthStr = "";
        let isSystemOpen = true;
        let loggedInStaffId = null;
        let loggedInPassword = "";
        
        // 追加: 祝日データを保存する変数
        let nationalHolidays = {}; 

        // ターゲット月を計算
        const today = new Date();
        let targetYear = today.getFullYear();
        let targetMonth = today.getMonth() + 2;
        if (targetMonth > 12) { targetMonth = 1; targetYear += 1; }
        currentTargetMonthStr = `${targetYear}-${String(targetMonth).padStart(2, '0')}`;

        window.onload = async function() {
            // 追加: 国の祝日データをAPIから自動取得
            try {
                const holRes = await fetch('https://holidays-jp.github.io/api/v1/date.json');
                nationalHolidays = await holRes.json();
            } catch (error) {
                console.error("祝日データの取得に失敗しました", error);
            }

            // システムの状態（受付中かどうか）を取得
            const statusRes = await fetch('/api/status');
            const statusData = await statusRes.json();
            isSystemOpen = statusData.is_open;

            // スタッフ一覧を取得してドロップダウンに入れる
            const response = await fetch('/api/staff');
            const staffList = await response.json();
            const select = document.getElementById('staff-select');
            staffList.forEach(staff => {
                const option = document.createElement('option');
                option.value = staff.id;
                option.textContent = staff.name;
                select.appendChild(option);
            });
        };

        // ログイン処理
        async function login() {
            const staffId = document.getElementById('staff-select').value;
            const password = document.getElementById('staff-password').value;
            const selectEl = document.getElementById('staff-select');
            const staffName = selectEl.options[selectEl.selectedIndex].text;

            if (!staffId || !password) {
                alert("名前と従業員番号を入力してください。");
                return;
            }

            // 提出データを取得するAPIを叩く
            const res = await fetch('/api/staff/my_shifts', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    staff_id: parseInt(staffId),
                    password: password,
                    target_month: currentTargetMonthStr
                })
            });

            if (!res.ok) {
                const errorData = await res.json();
                alert(errorData.error || "ログインに失敗しました");
                return;
            }

            const data = await res.json();
            
            // ログイン成功したら情報を保存して画面を切り替え
            loggedInStaffId = parseInt(staffId);
            loggedInPassword = password;
            document.getElementById('welcome-message').textContent = `${staffName} さんの希望休`;
            
            document.getElementById('login-section').classList.add('hidden');
            document.getElementById('main-section').classList.remove('hidden');

            setupDashboard(data);
        }

        // ログイン後の画面セットアップ
        function setupDashboard(data) {
            const alertBox = document.getElementById('status-alert');
            const submitBtn = document.getElementById('submit-btn');
            const memoEl = document.getElementById('staff-memo');
            const noShiftCb = document.getElementById('no-shift-cb');
            const noShiftContainer = document.getElementById('no-shift-container');
            const calendarWrapper = document.getElementById('calendar-wrapper');

            // サーバーから取得した提出済みのデータをセット
            selectedDates = data.dates || [];
            memoEl.value = data.memo || "";

            // もし「提出済み」かつ「日付が0件」なら「希望休なし」チェックを入れる
            if (data.submitted && selectedDates.length === 0) {
                noShiftCb.checked = true;
            } else {
                noShiftCb.checked = false;
            }

            // 受付停止中の場合
            if (!isSystemOpen) {
                alertBox.textContent = "受付期間は終了しました。以下の内容で登録されています。";
                alertBox.className = "alert-box alert-closed";
                alertBox.classList.remove('hidden');
                
                // 編集不可にする
                submitBtn.classList.add('hidden');
                memoEl.disabled = true;
                noShiftCb.disabled = true;
                noShiftContainer.style.opacity = "0.6";
                calendarWrapper.classList.add('disabled-calendar');
                
            } else {
                // 受付中の場合
                submitBtn.classList.remove('hidden');
                submitBtn.textContent = data.submitted ? "変更を再提出する" : "提出する";
                
                if (data.submitted) {
                    alertBox.textContent = "提出済みです。内容を変更する場合は修正して再提出してください。";
                    alertBox.className = "alert-box alert-submitted";
                    alertBox.classList.remove('hidden');
                } else {
                    alertBox.classList.add('hidden');
                }
            }

            generateCalendar();
            toggleCalendar(); // 希望休なしチェックの状態を反映
        }

        function toggleCalendar() {
            const isChecked = document.getElementById('no-shift-cb').checked;
            const calendarWrapper = document.getElementById('calendar-wrapper');
            
            if (isChecked) {
                calendarWrapper.classList.add('disabled-calendar');
                // 受付中の場合のみ、チェックされたら日付をリセットする
                if (isSystemOpen) {
                    selectedDates = [];
                    document.querySelectorAll('.day-cell').forEach(el => el.classList.remove('selected'));
                }
            } else {
                // 受付中の場合のみ、カレンダーの操作を有効にする
                if (isSystemOpen) {
                    calendarWrapper.classList.remove('disabled-calendar');
                }
            }
        }

        function generateCalendar() {
            const calendarGrid = document.getElementById('calendar-grid');
            calendarGrid.innerHTML = ''; // 一度クリア
            document.getElementById('calendar-title').textContent = `${currentTargetMonthStr.replace('-', '年 ')}月`;

            const year = parseInt(currentTargetMonthStr.split('-')[0]);
            const month = parseInt(currentTargetMonthStr.split('-')[1]);

            const firstDayOfWeek = new Date(year, month - 1, 1).getDay();
            const daysInMonth = new Date(year, month, 0).getDate();

            for (let i = 0; i < firstDayOfWeek; i++) {
                const emptyDiv = document.createElement('div');
                emptyDiv.className = 'empty-cell';
                calendarGrid.appendChild(emptyDiv);
            }

            for (let i = 1; i <= daysInMonth; i++) {
                const dayDiv = document.createElement('div');
                dayDiv.className = 'day-cell';
                
                // --- 変更箇所：日付フォーマットと祝日判定 ---
                const monthStr = String(month).padStart(2, '0');
                const dayStr = String(i).padStart(2, '0');
                const dateString = `${year}-${monthStr}-${dayStr}`;

                const currentDayOfWeek = (firstDayOfWeek + i - 1) % 7;
                const isHoliday = nationalHolidays[dateString] !== undefined;
                
                // 日付の数字をセット
                dayDiv.textContent = i;

                // 色分け（日・祝は赤、土は青）
                if (currentDayOfWeek === 0 || isHoliday) {
                    dayDiv.style.color = '#e74c3c';
                    // 祝日の場合は名前も小さく表示
                    if (isHoliday) {
                        const holSpan = document.createElement('span');
                        holSpan.className = 'holiday-name';
                        holSpan.textContent = nationalHolidays[dateString];
                        dayDiv.appendChild(holSpan);
                    }
                } else if (currentDayOfWeek === 6) {
                    dayDiv.style.color = '#3498db';
                }
                // ---------------------------------------------

                // すでに提出済みの日は色を付ける
                if (selectedDates.includes(dateString)) {
                    dayDiv.classList.add('selected');
                }

                // カレンダーのクリックイベント（受付中の場合のみ有効）
                if (isSystemOpen) {
                    dayDiv.onclick = () => {
                        if(document.getElementById('no-shift-cb').checked) return;
                        
                        if (selectedDates.includes(dateString)) {
                            selectedDates = selectedDates.filter(d => d !== dateString);
                            dayDiv.classList.remove('selected');
                        } else {
                            selectedDates.push(dateString);
                            dayDiv.classList.add('selected');
                        }
                    };
                }
                
                calendarGrid.appendChild(dayDiv);
            }
        }

        async function submitShifts() {
            const memo = document.getElementById('staff-memo').value;
            const isNoShift = document.getElementById('no-shift-cb').checked;
            
            if (!isNoShift && selectedDates.length === 0) {
                alert('休み希望日を選択するか、「希望休なし」にチェックを入れてください');
                return;
            }

            const payload = {
                staff_id: loggedInStaffId,
                password: loggedInPassword, 
                dates: selectedDates,
                target_month: currentTargetMonthStr,
                memo: memo
            };

            const response = await fetch('/api/shifts', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (response.ok) {
                alert('シフトの提出・更新が完了しました！');
                // データを再取得して画面を更新
                login(); 
            } else {
                const errorData = await response.json();
                alert(errorData.error || 'エラーが発生しました');
            }
        }

        function logout() {
            loggedInStaffId = null;
            loggedInPassword = "";
            document.getElementById('staff-password').value = "";
            document.getElementById('login-section').classList.remove('hidden');
            document.getElementById('main-section').classList.add('hidden');
        }
    </script>
</body>
</html>
