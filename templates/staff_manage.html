<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>【管理者】スタッフ管理</title>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    
    <style>
        body { font-family: sans-serif; padding: 15px; background-color: #f4f7f6; color: #333; margin: 0; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); box-sizing: border-box;}
        h1 { font-size: 20px; text-align: center; margin-top: 0; border-bottom: 2px solid #ddd; padding-bottom: 10px;}
        
        .form-group { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; background: #f9f9f9; padding: 15px; border-radius: 8px;}
        .form-group input[type="text"] { padding: 12px; font-size: 16px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box;}
        
        .btn { padding: 12px 15px; font-size: 16px; font-weight: bold; border: none; border-radius: 5px; cursor: pointer; color: white; background-color: #4CAF50;}
        .btn:hover { background-color: #45a049; }
        .btn-back { background-color: #95a5a6; width: 100%; margin-top: 20px;}
        
        .staff-list { list-style: none; padding: 0; margin: 0; }
        .staff-item { display: flex; align-items: center; justify-content: space-between; background: white; padding: 15px; border: 1px solid #ddd; border-radius: 5px; margin-bottom: 8px; background-color: white;}
        
        /* ▼ 並び替えの「≡」マーク専用のスタイルに変更 ▼ */
        .drag-handle { color: #aaa; margin-right: 15px; font-size: 20px; user-select: none; cursor: grab;}
        .drag-handle:active { cursor: grabbing; color: #333;}
        
        .staff-info { flex-grow: 1; display: flex; flex-direction: column; gap: 4px;}
        .staff-name { font-weight: bold; font-size: 16px;}
        .staff-pass { font-size: 13px; color: #777;}
        
        /* 編集・削除ボタンを並べるコンテナ */
        .action-btns { display: flex; gap: 5px; }
        .btn-edit { background-color: #f39c12; color: white; border: none; padding: 8px 12px; border-radius: 5px; cursor: pointer; font-size: 12px;}
        .btn-delete { background-color: #e74c3c; color: white; border: none; padding: 8px 12px; border-radius: 5px; cursor: pointer; font-size: 12px;}

        /* 編集ポップアップ（モーダル）のスタイル */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: white; padding: 25px; border-radius: 10px; width: 90%; max-width: 400px; box-sizing: border-box; box-shadow: 0 4px 15px rgba(0,0,0,0.2);}
        .modal-content input[type="text"] { width: 100%; padding: 12px; font-size: 16px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; margin-bottom: 10px;}
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚙️ スタッフ管理</h1>
        
        <div class="form-group">
            <input type="text" id="new-name" placeholder="スタッフ名">
            <input type="text" id="new-pass" placeholder="従業員番号 (ログイン用)">
            <label style="font-size: 14px; display: flex; align-items: center; gap: 5px; font-weight: bold;">
                <input type="checkbox" id="new-is-double" style="width: 20px; height: 20px;"> 
                昼・夜シフト両方に入るスタッフ（チェックすると昼夜選択式のUIになります）
            </label>
            <button class="btn" onclick="addStaff()">＋ 新規スタッフを追加</button>
        </div>

        <p style="font-size: 12px; color: #777; margin-bottom: 5px;">※ ≡ を上下にドラッグして表示順を並び替えられます</p>
        <ul id="staff-list" class="staff-list">
            </ul>

        <button class="btn btn-back" onclick="location.href='/admin'">カレンダーに戻る</button>
    </div>

    <div id="edit-modal" class="modal hidden">
        <div class="modal-content">
            <h3 style="margin-top: 0;">スタッフ情報の編集</h3>
            <input type="hidden" id="edit-id">
            <label style="font-size: 14px; font-weight: bold; color: #555;">スタッフ名</label>
            <input type="text" id="edit-name" placeholder="スタッフ名">
            
            <label style="font-size: 14px; font-weight: bold; color: #555;">従業員番号</label>
            <input type="text" id="edit-pass" placeholder="従業員番号">
            
            <label style="font-size: 14px; display: flex; align-items: center; gap: 5px; font-weight: bold; margin-top: 10px;">
                <input type="checkbox" id="edit-is-double" style="width: 20px; height: 20px;"> 
                昼・夜シフト両方に入るスタッフ
            </label>
            
            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button class="btn" style="flex: 1;" onclick="submitEdit()">保存する</button>
                <button class="btn" style="flex: 1; background-color: #95a5a6;" onclick="closeEditModal()">キャンセル</button>
            </div>
        </div>
    </div>

    <script>
        // SortableJSのインスタンスを保持する変数
        let sortableInstance = null;

        window.onload = function() {
            if (sessionStorage.getItem('admin_logged_in') !== 'true') {
                window.location.href = '/admin'; 
                return;
            }
            loadStaff();
        };

        async function loadStaff() {
            const res = await fetch('/api/staff');
            const staffList = await res.json();
            const ul = document.getElementById('staff-list');
            ul.innerHTML = '';

            staffList.forEach(staff => {
                const item = document.createElement('li');
                item.className = 'staff-item';
                // HTML5の draggable="true" はもう不要なので削除
                item.dataset.id = staff.id;

                const doubleTag = staff.is_double_shift ? '<span style="font-size: 10px; background: #3498db; color: white; padding: 2px 5px; border-radius: 3px; margin-left: 5px;">昼夜</span>' : '';

                item.innerHTML = `
                    <div class="drag-handle">☰</div>
                    <div class="staff-info">
                        <div class="staff-name">${staff.name} ${doubleTag}</div>
                        <span class="staff-pass">従業員番号: ${staff.password}</span>
                    </div>
                    <div class="action-btns">
                        <button class="btn-edit" onclick="openEditModal(${staff.id}, '${staff.name}', '${staff.password}', ${staff.is_double_shift})">編集</button>
                        <button class="btn-delete" onclick="deleteStaff(${staff.id}, '${staff.name}')">削除</button>
                    </div>
                `;

                // 以前の複雑なイベントリスナーは全て削除
                ul.appendChild(item);
            });

            // ▼ スマホ対応のSortableJSをここで起動！ ▼
            if (sortableInstance) {
                sortableInstance.destroy(); // リスト再描画時は古い設定をリセット
            }
            sortableInstance = new Sortable(ul, {
                handle: '.drag-handle', // 「≡」マークを触った時だけドラッグ可能にする（ボタン誤爆防止）
                animation: 150,         // アニメーション速度（ミリ秒）
                ghostClass: 'sortable-ghost', // ドラッグ中の背景色などを変えたい場合に使うクラス
                onEnd: function () {
                    // 指（マウス）を離してドロップが完了したらバックエンドに順番を送信
                    updateOrder();
                }
            });
        }

        // --- 編集ポップアップの処理 ---
        function openEditModal(id, name, pass, isDouble) {
            document.getElementById('edit-id').value = id;
            document.getElementById('edit-name').value = name;
            document.getElementById('edit-pass').value = pass;
            document.getElementById('edit-is-double').checked = isDouble;
            document.getElementById('edit-modal').classList.remove('hidden');
        }

        function closeEditModal() {
            document.getElementById('edit-modal').classList.add('hidden');
        }

        async function submitEdit() {
            const id = document.getElementById('edit-id').value;
            const name = document.getElementById('edit-name').value;
            const pass = document.getElementById('edit-pass').value;
            const isDouble = document.getElementById('edit-is-double').checked;

            if (!name || !pass) {
                alert('名前と従業員番号を入力してください');
                return;
            }

            const res = await fetch(`/api/staff/${id}`, {
                method: 'PUT',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ name: name, password: pass, is_double_shift: isDouble })
            });

            if (res.ok) {
                closeEditModal(); 
                loadStaff();      
            } else {
                const data = await res.json();
                alert(data.error || '更新に失敗しました。');
            }
        }

        // --- 順番保存・追加・削除処理 ---
        async function updateOrder() {
            const ul = document.getElementById('staff-list');
            const items = Array.from(ul.children);
            const orderData = items.map((item, index) => ({
                id: item.dataset.id,
                display_order: index + 1
            }));

            await fetch('/api/staff/reorder', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(orderData)
            });
        }

        async function addStaff() {
            const name = document.getElementById('new-name').value;
            const pass = document.getElementById('new-pass').value;
            const isDouble = document.getElementById('new-is-double').checked;

            if (!name || !pass) {
                alert('名前と従業員番号を入力してください');
                return;
            }

            const res = await fetch('/api/staff', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ name: name, password: pass, is_double_shift: isDouble })
            });

            if (res.ok) {
                document.getElementById('new-name').value = '';
                document.getElementById('new-pass').value = '';
                document.getElementById('new-is-double').checked = false;
                loadStaff();
            } else {
                const data = await res.json();
                alert(data.error || '追加に失敗しました。');
            }
        }

        async function deleteStaff(id, name) {
            if (!confirm(`本当に「${name}」さんを削除しますか？\n※このスタッフのシフト履歴も消去されます`)) return;

            const res = await fetch(`/api/staff/${id}`, { method: 'DELETE' });
            if (res.ok) {
                loadStaff();
            }
        }
    </script>
</body>
</html>
