<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>【管理者】シフト確認カレンダー</title>
    <style>
        body { font-family: sans-serif; padding: 15px; color: #333; background-color: #f4f7f6; margin: 0;}
        
        .login-container { max-width: 400px; margin: 50px auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; }
        .login-input { padding: 12px; font-size: 16px; width: 100%; border-radius: 5px; border: 1px solid #ccc; box-sizing: border-box; margin-bottom: 15px; }
        .login-btn { background-color: #2c3e50; color: white; padding: 15px; border: none; border-radius: 5px; font-size: 16px; cursor: pointer; width: 100%; font-weight: bold; }
        .hidden { display: none !important; }

        .header-container { display: flex; flex-direction: column; gap: 10px; max-width: 900px; margin: 0 auto; align-items: center;}
        .manage-link { background-color: #f39c12; color: white; padding: 10px 15px; text-decoration: none; border-radius: 5px; font-weight: bold; font-size: 14px;}
        .calendar-container { max-width: 900px; margin: 0 auto; background: white; padding: 15px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        
        .month-nav { display: flex; justify-content: center; align-items: center; gap: 15px; margin-bottom: 15px; }
        .month-btn { background-color: #eee; border: 1px solid #ccc; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-size: 16px; font-weight: bold; }
        .month-btn:hover { background-color: #ddd; }
        .calendar-title { font-size: 20px; font-weight: bold; margin: 0; min-width: 140px; text-align: center;}
        
        /* 凡例を昼・夜のツートン対応に変更 */
        .legend { display: flex; justify-content: center; gap: 15px; margin-bottom: 15px; font-size: 12px; font-weight: bold; flex-wrap: wrap;}
        .legend-item { display: flex; align-items: center; gap: 5px; }
        .legend-color { width: 15px; height: 15px; border-radius: 3px; }
        
        .calendar-grid, .weekday-header { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; }
        .weekday-header div { text-align: center; font-weight: bold; font-size: 12px; padding-bottom: 5px; border-bottom: 2px solid #ddd; margin-bottom: 5px; }
        .sun { color: #e74c3c; } .sat { color: #96d0f7; }
        .day-cell { border: 1px solid #eee; border-radius: 5px; min-height: 80px; padding: 3px; background-color: #fafafa; display: flex; flex-direction: column; gap: 2px; }
        .date-number { font-weight: bold; margin-bottom: 3px; font-size: 12px; text-align: left; padding-left: 2px; }
        .empty-cell { border: none; background-color: transparent; }
        .staff-badge { font-size: 10px; padding: 3px 1px; border-radius: 3px; text-align: center; word-break: break-all; font-weight: bold; line-height: 1.1;}
        .status-unsubmitted { background-color: #e0e0e0; color: #777; }
        
        #status-toggle-btn { padding: 10px 15px; font-weight: bold; border-radius: 5px; cursor: pointer; font-size: 14px; width: 100%;}
        
        .memo-container { max-width: 900px; margin: 20px auto 0; background: white; padding: 15px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .memo-title { font-size: 16px; font-weight: bold; margin-bottom: 10px; border-bottom: 2px solid #ddd; padding-bottom: 5px;}
        .memo-list { padding-left: 0; line-height: 1.6; list-style: none; font-size: 14px;}
        .memo-item { margin-bottom: 10px; background: #f9f9f9; padding: 8px; border-radius: 5px; border-left: 4px solid #3498db;}
    </style>
</head>
<body>

    <div id="login-section" class="login-container">
        <h2 style="margin-top: 0;">管理者ページ</h2>
        <input type="password" id="admin-password" class="login-input" placeholder="管理者パスワードを入力" onkeypress="handleKeyPress(event)">
        <button class="login-btn" onclick="adminLogin()">ログイン</button>
    </div>

    <div id="main-section" class="hidden">
        <div class="header-container">
            <h2 style="margin: 0;">希望休 確認ページ</h2>
            <div style="display: flex; gap: 10px; width: 100%; max-width: 400px; justify-content: space-between;">
                <button id="status-toggle-btn" onclick="toggleStatus()"></button>
                <a href="/staff_manage" class="manage-link" style="white-space: nowrap;">⚙️ 管理</a>
            </div>
        </div>

        <div class="calendar-container" style="margin-top: 15px;">
            <div class="month-nav">
                <button class="month-btn" onclick="changeMonth(-1)">＜ 前月</button>
                <div id="calendar-title" class="calendar-title"></div>
                <button class="month-btn" onclick="changeMonth(1)">次月 ＞</button>
            </div>

            <div class="legend">
                <div class="legend-item"><div class="legend-color" style="background-color: #ff6b6b;"></div>1日休</div>
                <div class="legend-item"><div class="legend-color" style="background-color: #96d0f7;"></div>1日出勤</div>
                <div class="legend-item"><div class="legend-color" style="background: linear-gradient(to right, #ff6b6b 50%, #96d0f7 50%);"></div>昼休/夜出</div>
                <div class="legend-item"><div class="legend-color" style="background: linear-gradient(to right, #96d0f7 50%, #ff6b6b 50%);"></div>昼出/夜休</div>
                <div class="legend-item"><div class="legend-color" style="background-color: #e0e0e0;"></div>未登録</div>
            </div>
            
            <div class="weekday-header">
                <div class="sun">日</div><div>月</div><div>火</div><div>水</div><div>木</div><div>金</div><div class="sat">土</div>
            </div>

            <div id="calendar-grid" class="calendar-grid"></div>
        </div>

        <div class="memo-container">
            <div class="memo-title">📝 備考・メッセージ</div>
            <ul id="memo-list" class="memo-list"></ul>
        </div>
    </div>

    <script>
        let isSubmissionOpen = true; 
        let nationalHolidays = {};
        
        const today = new Date();
        let currentViewYear = today.getFullYear();
        let currentViewMonth = today.getMonth() + 2;
        if (currentViewMonth > 12) { currentViewMonth -= 12; currentViewYear += 1; }

        window.onload = async function() {
            try {
                const holRes = await fetch('https://holidays-jp.github.io/api/v1/date.json');
                nationalHolidays = await holRes.json();
            } catch (error) {
                console.error("祝日エラー", error);
            }

            if (sessionStorage.getItem('admin_logged_in') === 'true') {
                showMainContent();
            }
        };

        function handleKeyPress(event) {
            if (event.key === 'Enter') adminLogin();
        }

        async function adminLogin() {
            const pw = document.getElementById('admin-password').value;
            const res = await fetch('/api/admin/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ password: pw })
            });

            if (res.ok) {
                sessionStorage.setItem('admin_logged_in', 'true');
                showMainContent();
            } else {
                alert("パスワードが違います");
            }
        }

        async function showMainContent() {
            document.getElementById('login-section').classList.add('hidden');
            document.getElementById('main-section').classList.remove('hidden');

            const statusRes = await fetch('/api/status');
            const statusData = await statusRes.json();
            isSubmissionOpen = statusData.is_open;
            updateToggleButton();

            await generateAdminCalendar();
        }

        function updateToggleButton() {
            const btn = document.getElementById('status-toggle-btn');
            if (isSubmissionOpen) {
                btn.textContent = "🟢 受付中 (押して停止)";
                btn.style.backgroundColor = "#e8f5e9";
                btn.style.color = "#2e7d32";
                btn.style.border = "1px solid #4CAF50";
            } else {
                btn.textContent = "🔴 停止中 (押して再開)";
                btn.style.backgroundColor = "#ffebee";
                btn.style.color = "#c62828";
                btn.style.border = "1px solid #f44336";
            }
        }

        async function toggleStatus() {
            const newStatus = !isSubmissionOpen;
            if (!confirm(newStatus ? "受付を再開しますか？" : "受付を停止しますか？")) return;

            const res = await fetch('/api/status', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ is_open: newStatus })
            });
            if (res.ok) {
                isSubmissionOpen = newStatus;
                updateToggleButton();
            }
        }

        function changeMonth(diff) {
            currentViewMonth += diff;
            if (currentViewMonth > 12) {
                currentViewMonth = 1;
                currentViewYear += 1;
            } else if (currentViewMonth < 1) {
                currentViewMonth = 12;
                currentViewYear -= 1;
            }
            generateAdminCalendar(); 
        }

        async function generateAdminCalendar() {
            const calendarGrid = document.getElementById('calendar-grid');
            calendarGrid.innerHTML = ''; 
            
            document.getElementById('calendar-title').textContent = `${currentViewYear}年 ${currentViewMonth}月`;

            const staffRes = await fetch('/api/staff');
            const staffList = await staffRes.json();

            const monthStrForApi = `${currentViewYear}-${String(currentViewMonth).padStart(2, '0')}`;
            const shiftRes = await fetch(`/api/shifts/${monthStrForApi}`);
            const data = await shiftRes.json(); 
            
            const shiftsData = data.shifts; 
            const submittedInfo = data.submitted_info; 
            const submittedStaffNames = new Set(submittedInfo.map(info => info.name)); 

            const firstDayOfWeek = new Date(currentViewYear, currentViewMonth - 1, 1).getDay();
            const daysInMonth = new Date(currentViewYear, currentViewMonth, 0).getDate();

            for (let i = 0; i < firstDayOfWeek; i++) {
                const emptyDiv = document.createElement('div');
                emptyDiv.className = 'empty-cell';
                calendarGrid.appendChild(emptyDiv);
            }

            for (let i = 1; i <= daysInMonth; i++) {
                const dayDiv = document.createElement('div');
                dayDiv.className = 'day-cell';

                const dateSpan = document.createElement('div');
                dateSpan.className = 'date-number';
                dateSpan.textContent = i;
                
                const monthStr = String(currentViewMonth).padStart(2, '0');
                const dayStr = String(i).padStart(2, '0');
                const dateString = `${currentViewYear}-${monthStr}-${dayStr}`;

                const currentDayOfWeek = (firstDayOfWeek + i - 1) % 7;
                const isHoliday = nationalHolidays[dateString] !== undefined;

                if (currentDayOfWeek === 0 || isHoliday) {
                    dateSpan.style.color = '#e74c3c'; 
                } else if (currentDayOfWeek === 6) {
                    dateSpan.style.color = '#3498db'; 
                }
                dayDiv.appendChild(dateSpan);

                staffList.forEach(staff => {
                    const badge = document.createElement('div');
                    badge.className = 'staff-badge';
                    badge.textContent = staff.name;

                    // ▼ 変更箇所：昼と夜の休みを別々に判定して色を塗る ▼
                    const isDayOff = shiftsData.some(shift => shift.date === dateString && shift.staff_name === staff.name && shift.time_of_day === 'day');
                    const isNightOff = shiftsData.some(shift => shift.date === dateString && shift.staff_name === staff.name && shift.time_of_day === 'night');

                    if (submittedStaffNames.has(staff.name)) {
                        if (isDayOff && isNightOff) {
                            badge.style.background = '#ff6b6b';
                            badge.style.color = 'white';
                        } else if (!isDayOff && !isNightOff) {
                            badge.style.background = '#96d0f7';
                            badge.style.color = 'white';
                        } else if (isDayOff && !isNightOff) {
                            // 昼休(赤)・夜出(青) のツートンカラー
                            badge.style.background = 'linear-gradient(to right, #ff6b6b 50%, #96d0f7 50%)';
                            badge.style.color = 'white';
                        } else if (!isDayOff && isNightOff) {
                            // 昼出(青)・夜休(赤) のツートンカラー
                            badge.style.background = 'linear-gradient(to right, #96d0f7 50%, #ff6b6b 50%)';
                            badge.style.color = 'white';
                        }
                    } else {
                        badge.classList.add('status-unsubmitted');
                    }
                    // ▲ 変更箇所ここまで ▲

                    dayDiv.appendChild(badge);
                });
                calendarGrid.appendChild(dayDiv);
            }

            const memoList = document.getElementById('memo-list');
            memoList.innerHTML = '';
            let hasMemo = false;

            submittedInfo.forEach(info => {
                if (info.memo && info.memo.trim() !== '') {
                    hasMemo = true;
                    const li = document.createElement('li');
                    li.className = 'memo-item';
                    li.innerHTML = `<strong>${info.name}</strong><br>${info.memo}`;
                    memoList.appendChild(li);
                }
            });

            if (!hasMemo) {
                memoList.innerHTML = '<li style="color: #777;">メッセージはありません</li>';
            }
        }
    </script>
</body>
</html>
