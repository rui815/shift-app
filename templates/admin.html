<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>【管理者】シフト確認カレンダー</title>
    <style>
        body { font-family: sans-serif; padding: 20px; color: #333; background-color: #f4f7f6; }
        
        /* ログイン用デザイン */
        .login-container { max-width: 400px; margin: 100px auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; }
        .login-input { padding: 12px; font-size: 16px; width: 100%; border-radius: 5px; border: 1px solid #ccc; box-sizing: border-box; margin-bottom: 15px; }
        .login-btn { background-color: #2c3e50; color: white; padding: 15px; border: none; border-radius: 5px; font-size: 16px; cursor: pointer; width: 100%; font-weight: bold; }
        .login-btn:hover { background-color: #1a252f; }
        .hidden { display: none !important; }

        /* カレンダー用デザイン */
        .header-container { display: flex; justify-content: space-between; align-items: center; max-width: 900px; margin: 0 auto; }
        .manage-link { background-color: #f39c12; color: white; padding: 10px 15px; text-decoration: none; border-radius: 5px; font-weight: bold; }
        .calendar-container { max-width: 900px; margin: 0 auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .calendar-title { text-align: center; font-size: 24px; font-weight: bold; margin-bottom: 10px; }
        .legend { display: flex; justify-content: center; gap: 20px; margin-bottom: 20px; font-size: 14px; font-weight: bold; }
        .legend-item { display: flex; align-items: center; gap: 5px; }
        .legend-color { width: 15px; height: 15px; border-radius: 3px; }
        .calendar-grid, .weekday-header { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }
        .weekday-header div { text-align: center; font-weight: bold; padding-bottom: 10px; border-bottom: 2px solid #ddd; margin-bottom: 10px; }
        .sun { color: #e74c3c; } .sat { color: #3498db; }
        .day-cell { border: 1px solid #eee; border-radius: 5px; min-height: 100px; padding: 5px; background-color: #fafafa; display: flex; flex-direction: column; gap: 3px; }
        .date-number { font-weight: bold; margin-bottom: 5px; font-size: 14px; text-align: left; padding-left: 2px; }
        .empty-cell { border: none; background-color: transparent; }
        .staff-badge { font-size: 12px; padding: 4px 0; border-radius: 3px; text-align: center; word-break: break-all; font-weight: bold; }
        .status-off { background-color: #ff6b6b; color: white; }
        .status-work { background-color: #3498db; color: white; }
        .status-unsubmitted { background-color: #e0e0e0; color: #777; }
        
        #status-toggle-btn { padding: 10px 15px; font-weight: bold; border-radius: 5px; cursor: pointer; font-size: 14px;}
        
        .memo-container { max-width: 900px; margin: 20px auto 0; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .memo-title { font-size: 18px; font-weight: bold; margin-bottom: 15px; border-bottom: 2px solid #ddd; padding-bottom: 5px;}
        .memo-list { padding-left: 20px; line-height: 1.6; }
        .memo-item { margin-bottom: 10px; }
    </style>
</head>
<body>

    <div id="login-section" class="login-container">
        <h2 style="margin-top: 0;">店長用ログイン</h2>
        <input type="password" id="admin-password" class="login-input" placeholder="管理者パスワードを入力" onkeypress="handleKeyPress(event)">
        <button class="login-btn" onclick="adminLogin()">ログイン</button>
    </div>

    <div id="main-section" class="hidden">
        <div class="header-container">
            <h1>店長用：希望休 確認画面</h1>
            <div style="display: flex; gap: 10px; align-items: center;">
                <button id="status-toggle-btn" onclick="toggleStatus()"></button>
                <a href="/staff_manage" class="manage-link">⚙️ スタッフ管理</a>
            </div>
        </div>

        <div class="calendar-container" style="margin-top: 20px;">
            <div id="calendar-title" class="calendar-title"></div>

            <div class="legend">
                <div class="legend-item"><div class="legend-color" style="background-color: #ff6b6b;"></div>希望休</div>
                <div class="legend-item"><div class="legend-color" style="background-color: #3498db;"></div>出勤可</div>
                <div class="legend-item"><div class="legend-color" style="background-color: #e0e0e0;"></div>未登録</div>
            </div>
            
            <div class="weekday-header">
                <div class="sun">日</div><div>月</div><div>火</div><div>水</div><div>木</div><div>金</div><div class="sat">土</div>
            </div>

            <div id="calendar-grid" class="calendar-grid"></div>
        </div>

        <div class="memo-container">
            <div class="memo-title">📝 スタッフからの備考・メッセージ</div>
            <ul id="memo-list" class="memo-list"></ul>
        </div>
    </div>

    <script>
        let isSubmissionOpen = true; 

        window.onload = function() {
            // 一度ログインしたら、ブラウザを閉じるまでログイン状態を維持する
            if (sessionStorage.getItem('admin_logged_in') === 'true') {
                showMainContent();
            }
        };

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                adminLogin();
            }
        }

        async function adminLogin() {
            const pw = document.getElementById('admin-password').value;
            const res = await fetch('/api/admin/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ password: pw })
            });

            if (res.ok) {
                // ログイン成功
                sessionStorage.setItem('admin_logged_in', 'true');
                showMainContent();
            } else {
                alert("パスワードが違います");
            }
        }

        async function showMainContent() {
            document.getElementById('login-section').classList.add('hidden');
            document.getElementById('main-section').classList.remove('hidden');

            const statusRes = await fetch('/api/status');
            const statusData = await statusRes.json();
            isSubmissionOpen = statusData.is_open;
            updateToggleButton();

            await generateAdminCalendar();
        }

        function updateToggleButton() {
            const btn = document.getElementById('status-toggle-btn');
            if (isSubmissionOpen) {
                btn.textContent = "🟢 受付中 (クリックで停止)";
                btn.style.backgroundColor = "#e8f5e9";
                btn.style.color = "#2e7d32";
                btn.style.border = "1px solid #4CAF50";
            } else {
                btn.textContent = "🔴 受付停止中 (クリックで再開)";
                btn.style.backgroundColor = "#ffebee";
                btn.style.color = "#c62828";
                btn.style.border = "1px solid #f44336";
            }
        }

        async function toggleStatus() {
            const newStatus = !isSubmissionOpen;
            const confirmMsg = newStatus 
                ? "シフトの受付を【再開】しますか？\n（スタッフが提出・変更できるようになります）" 
                : "シフトの受付を【停止】しますか？\n（スタッフは提出・変更できなくなります）";
            
            if (!confirm(confirmMsg)) return;

            const res = await fetch('/api/status', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ is_open: newStatus })
            });

            if (res.ok) {
                isSubmissionOpen = newStatus;
                updateToggleButton();
            } else {
                alert("エラーが発生しました");
            }
        }

        async function generateAdminCalendar() {
            const calendarGrid = document.getElementById('calendar-grid');
            const calendarTitle = document.getElementById('calendar-title');
            
            const today = new Date();
            let targetYear = today.getFullYear();
            let targetMonth = today.getMonth() + 2;
            if (targetMonth > 12) { targetMonth = 1; targetYear += 1; }
            calendarTitle.textContent = `${targetYear}年 ${targetMonth}月 の希望休`;

            const staffRes = await fetch('/api/staff');
            const staffList = await staffRes.json();

            const monthStrForApi = `${targetYear}-${String(targetMonth).padStart(2, '0')}`;
            const shiftRes = await fetch(`/api/shifts/${monthStrForApi}`);
            const data = await shiftRes.json(); 
            
            const shiftsData = data.shifts; 
            const submittedInfo = data.submitted_info; 
            const submittedStaffNames = new Set(submittedInfo.map(info => info.name)); 

            const firstDayOfWeek = new Date(targetYear, targetMonth - 1, 1).getDay();
            const daysInMonth = new Date(targetYear, targetMonth, 0).getDate();

            for (let i = 0; i < firstDayOfWeek; i++) {
                const emptyDiv = document.createElement('div');
                emptyDiv.className = 'empty-cell';
                calendarGrid.appendChild(emptyDiv);
            }

            for (let i = 1; i <= daysInMonth; i++) {
                const dayDiv = document.createElement('div');
                dayDiv.className = 'day-cell';

                const dateSpan = document.createElement('div');
                dateSpan.className = 'date-number';
                dateSpan.textContent = i;
                
                const currentDayOfWeek = (firstDayOfWeek + i - 1) % 7;
                if (currentDayOfWeek === 0) dateSpan.style.color = '#e74c3c';
                if (currentDayOfWeek === 6) dateSpan.style.color = '#3498db';
                dayDiv.appendChild(dateSpan);

                const monthStr = String(targetMonth).padStart(2, '0');
                const dayStr = String(i).padStart(2, '0');
                const dateString = `${targetYear}-${monthStr}-${dayStr}`;

                staffList.forEach(staff => {
                    const badge = document.createElement('div');
                    badge.className = 'staff-badge';
                    badge.textContent = staff.name;

                    const isOff = shiftsData.some(shift => shift.date === dateString && shift.staff_name === staff.name);

                    if (isOff) {
                        badge.classList.add('status-off');
                    } else if (submittedStaffNames.has(staff.name)) {
                        badge.classList.add('status-work');
                    } else {
                        badge.classList.add('status-unsubmitted');
                    }

                    dayDiv.appendChild(badge);
                });
                calendarGrid.appendChild(dayDiv);
            }

            const memoList = document.getElementById('memo-list');
            memoList.innerHTML = '';
            let hasMemo = false;

            submittedInfo.forEach(info => {
                if (info.memo && info.memo.trim() !== '') {
                    hasMemo = true;
                    const li = document.createElement('li');
                    li.className = 'memo-item';
                    li.innerHTML = `<strong>${info.name}</strong>: ${info.memo}`;
                    memoList.appendChild(li);
                }
            });

            if (!hasMemo) {
                memoList.innerHTML = '<li style="color: #777; list-style: none; margin-left: -20px;">メッセージはありません</li>';
            }
        }
    </script>
</body>
</html>
